<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Artist Graph</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: Inter, Segoe UI, Arial, sans-serif;
        background: #111827;
        color: #f9fafb;
      }
      .container {
        max-width: 820px;
        margin: 2rem auto;
        padding: 1.25rem;
      }
      .card {
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 12px;
        padding: 1rem;
      }
      h1 {
        margin-top: 0;
        margin-bottom: 0.5rem;
      }
      p {
        color: #d1d5db;
      }
      form {
        display: grid;
        gap: 0.9rem;
      }
      .row {
        display: grid;
        gap: 0.75rem;
        grid-template-columns: 1fr 1fr;
      }
      label {
        display: grid;
        gap: 0.35rem;
        font-size: 0.95rem;
      }
      input,
      select {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border-radius: 8px;
        border: 1px solid #4b5563;
        background: #111827;
        color: #f9fafb;
        box-sizing: border-box;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: #10b981;
      }
      details {
        border: 1px solid #374151;
        border-radius: 8px;
        padding: 0.6rem 0.75rem;
      }
      summary {
        cursor: pointer;
      }
      button {
        width: fit-content;
        padding: 0.65rem 1rem;
        border: 0;
        border-radius: 8px;
        background: #10b981;
        color: #052e2b;
        font-weight: 700;
        cursor: pointer;
      }
      button[disabled] {
        opacity: 0.6;
        cursor: wait;
      }
      .status {
        min-height: 1.2rem;
        margin-top: 0.25rem;
      }
      .status.error {
        color: #fca5a5;
      }
      .status.success {
        color: #86efac;
      }
      .result-panel {
        background: #0b1220;
        border: 1px solid #374151;
        border-radius: 10px;
        padding: 0.85rem;
        margin-top: 1rem;
      }
      .empty-state {
        color: #9ca3af;
      }
      .summary-grid {
        display: grid;
        gap: 0.75rem;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .summary-card {
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 0.65rem;
      }
      .summary-label {
        color: #93c5fd;
        font-size: 0.8rem;
      }
      .summary-value {
        font-size: 1rem;
        font-weight: 700;
        margin-top: 0.2rem;
        word-break: break-word;
      }
      .section-title {
        margin: 0.95rem 0 0.55rem;
        font-size: 0.95rem;
        color: #d1d5db;
      }
      .path-flow {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.45rem;
      }
      .artist-pill {
        background: #1e293b;
        border: 1px solid #475569;
        border-radius: 999px;
        padding: 0.32rem 0.65rem;
        font-size: 0.88rem;
      }
      .arrow {
        color: #93c5fd;
      }
      .collab-list {
        display: grid;
        gap: 0.6rem;
      }
      .collab-item {
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 0.65rem;
      }
      .analytics-grid {
        display: grid;
        gap: 0.6rem;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .analytics-card {
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 0.6rem;
      }
      .analytics-label {
        color: #93c5fd;
        font-size: 0.78rem;
      }
      .analytics-value {
        margin-top: 0.2rem;
        font-weight: 700;
      }
      .graph-mode-controls {
        display: inline-flex;
        gap: 0.45rem;
        margin-top: 0.25rem;
        margin-bottom: 0.35rem;
      }
      .graph-mode-btn {
        background: #0f172a;
        border: 1px solid #334155;
        color: #cbd5e1;
        border-radius: 999px;
        padding: 0.35rem 0.75rem;
        font-size: 0.82rem;
        cursor: pointer;
      }
      .graph-mode-btn.active {
        background: #10b981;
        color: #052e2b;
        border-color: #10b981;
        font-weight: 700;
      }
      .graph-mode-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .graph-canvas {
        margin-top: 0.35rem;
        width: 100%;
        min-height: 420px;
        border: 1px solid #334155;
        border-radius: 10px;
        background: #020617;
      }
      .track-name {
        color: #86efac;
        font-weight: 700;
      }
      .artists-line {
        color: #e5e7eb;
        margin-top: 0.2rem;
      }
      .muted {
        color: #9ca3af;
      }
      .field-hint {
        color: #9ca3af;
        font-size: 0.8rem;
      }
      .artist-input-wrapper {
        position: relative;
      }
      .artist-suggestions-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: #1f2937;
        border: 1px solid #4b5563;
        border-top: none;
        border-radius: 0 0 8px 8px;
        max-height: 250px;
        overflow-y: auto;
        z-index: 10;
        display: none;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
      }
      .artist-suggestions-dropdown.show {
        display: block;
      }
      .artist-suggestion-item {
        padding: 0.6rem 0.75rem;
        cursor: pointer;
        border-bottom: 1px solid #374151;
        font-size: 0.95rem;
      }
      .artist-suggestion-item:hover,
      .artist-suggestion-item.selected {
        background: #374151;
      }
      .artist-suggestion-item:last-child {
        border-bottom: none;
      }
      @media (max-width: 720px) {
        .row {
          grid-template-columns: 1fr;
        }
        .summary-grid {
          grid-template-columns: 1fr;
        }
        .analytics-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Spotify Artist Graph</h1>
        <p>Type two artists to find a collaboration path between them.</p>

        <form id="connection-form">
          <div class="row">
            <label for="sourceArtist">
              Source artist
              <div class="artist-input-wrapper">
                <input id="sourceArtist" name="sourceArtist" placeholder="Kanye West" required />
                <div id="sourceArtistDropdown" class="artist-suggestions-dropdown"></div>
              </div>
            </label>
            <label for="targetArtist">
              Target artist
              <div class="artist-input-wrapper">
                <input id="targetArtist" name="targetArtist" placeholder="Taylor Swift" required />
                <div id="targetArtistDropdown" class="artist-suggestions-dropdown"></div>
              </div>
            </label>
          </div>
          <div class="field-hint">Start typing at least 2 characters to see artist suggestions.</div>

          <details>
            <summary>Advanced options</summary>
            <div class="row" style="margin-top: 0.75rem">
              <label for="maxDepth">
                Max depth
                <input id="maxDepth" name="maxDepth" type="number" min="1" max="8" value="3" />
              </label>
              <label for="maxAlbumsPerArtist">
                Max albums per artist
                <input
                  id="maxAlbumsPerArtist"
                   name="maxAlbumsPerArtist"
                   type="number"
                   min="1"
                   max="100"
                   value="15"
                  />
                </label>
              </div>
            <div class="row" style="margin-top: 0.75rem">
              <label for="maxTracksPerAlbum">
                Max tracks per album
                <input
                  id="maxTracksPerAlbum"
                   name="maxTracksPerAlbum"
                   type="number"
                   min="1"
                   max="50"
                   value="20"
                  />
                </label>
              </div>
          </details>

          <button id="submit-btn" type="submit">Find connection</button>
          <div id="status" class="status" aria-live="polite"></div>
        </form>

        <div id="result" class="result-panel" aria-live="polite"></div>
      </section>
    </main>

    <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
    <script>
      const form = document.getElementById('connection-form');
      const resultEl = document.getElementById('result');
      const statusEl = document.getElementById('status');
      const submitBtn = document.getElementById('submit-btn');
      const sourceArtistInput = document.getElementById('sourceArtist');
      const targetArtistInput = document.getElementById('targetArtist');
      const sourceArtistDropdown = document.getElementById('sourceArtistDropdown');
      const targetArtistDropdown = document.getElementById('targetArtistDropdown');
      const SEARCH_TIMEOUT_MS = 120000;
      let activeConnectionSearchController = null;
      let graph = null;
      let graphMode = 'path';

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function renderEmptyState(message) {
        if (graph) {
          graph.destroy();
          graph = null;
        }
        resultEl.innerHTML = `<div class="empty-state">${escapeHtml(message)}</div>`;
      }

      function getPathGraphElements(data) {
        const pathItems = Array.isArray(data.path) ? data.path : [];
        const collabItems = Array.isArray(data.collaborations) ? data.collaborations : [];
        const nodesById = new Map();
        const pathOrder = [];

        pathItems.forEach((node) => {
          if (node && typeof node.id === 'string') {
            nodesById.set(node.id, node.name || node.id);
            pathOrder.push(node.id);
          }
        });

        collabItems.forEach((edge) => {
          if (edge?.fromArtist?.id) {
            nodesById.set(edge.fromArtist.id, edge.fromArtist.name || edge.fromArtist.id);
          }
          if (edge?.toArtist?.id) {
            nodesById.set(edge.toArtist.id, edge.toArtist.name || edge.toArtist.id);
          }
        });

        const nodes = Array.from(nodesById.entries()).map(([id, label]) => ({
          data: { id, label },
        }));

        const edgeIds = new Set();
        const edges = collabItems
          .map((edge, index) => {
            const source = edge?.fromArtist?.id;
            const target = edge?.toArtist?.id;
            if (!source || !target) {
              return null;
            }

            const name = edge?.track?.name || `Step ${index + 1}`;
            const edgeId = `${source}__${target}__${name}`;
            if (edgeIds.has(edgeId)) {
              return null;
            }
            edgeIds.add(edgeId);

            return {
              data: {
                id: `e${index}`,
                source,
                target,
                label: name,
              },
            };
          })
          .filter(Boolean);

        return { nodes, edges, pathOrder };
      }

      function getExploredGraphElements(data) {
        const graphData = data.exploredGraph;
        const nodeItems = Array.isArray(graphData?.nodes) ? graphData.nodes : [];
        const edgeItems = Array.isArray(graphData?.edges) ? graphData.edges : [];

        const nodes = nodeItems
          .filter((node) => node && typeof node.id === 'string')
          .map((node) => ({
            data: {
              id: node.id,
              label: node.name || node.id,
            },
          }));

        const edgeIds = new Set();
        const edges = edgeItems
          .map((edge, index) => {
            const source = edge?.fromArtist?.id;
            const target = edge?.toArtist?.id;
            if (!source || !target) {
              return null;
            }
            const label = edge?.track?.name || `Edge ${index + 1}`;
            const key = `${source}__${target}__${label}`;
            if (edgeIds.has(key)) {
              return null;
            }
            edgeIds.add(key);
            return {
              data: {
                id: `x${index}`,
                source,
                target,
                label,
              },
            };
          })
          .filter(Boolean);

        return { nodes, edges, pathOrder: [] };
      }

      function getGraphPositions(nodeIds, pathOrder) {
        const pathIndexById = new Map(pathOrder.map((id, index) => [id, index]));
        const positions = {};
        const horizontalSpacing = 220;
        const topRowY = 110;
        const extraRowY = 250;
        const extras = [];

        nodeIds.forEach((id) => {
          if (!pathIndexById.has(id)) {
            extras.push(id);
            return;
          }
          positions[id] = {
            x: pathIndexById.get(id) * horizontalSpacing,
            y: topRowY,
          };
        });

        extras.forEach((id, index) => {
          positions[id] = {
            x: index * horizontalSpacing,
            y: extraRowY,
          };
        });

        return positions;
      }

      function renderGraph(data) {
        const graphEl = document.getElementById('graph');
        if (!graphEl) {
          return;
        }

        if (graph) {
          graph.destroy();
          graph = null;
        }

        if (typeof window.cytoscape !== 'function') {
          graphEl.innerHTML = '<div class="muted">Graph library failed to load.</div>';
          return;
        }

        const { nodes, edges, pathOrder } =
          graphMode === 'explored' ? getExploredGraphElements(data) : getPathGraphElements(data);
        if (nodes.length === 0) {
          graphEl.innerHTML = '<div class="muted">No graph data to render.</div>';
          return;
        }
        const positions =
          graphMode === 'path'
            ? getGraphPositions(
                nodes.map((node) => node.data.id),
                pathOrder
              )
            : {};

        const layout =
          graphMode === 'explored'
            ? {
                name: 'cose',
                animate: false,
                fit: true,
                padding: 30,
                idealEdgeLength: 120,
                nodeRepulsion: 100000,
                edgeElasticity: 100,
              }
            : {
                name: 'preset',
                positions: (node) => positions[node.id()] ?? { x: 0, y: 110 },
                animate: false,
                fit: true,
                padding: 30,
              };

        graphEl.innerHTML = '';
        graph = window.cytoscape({
          container: graphEl,
          elements: [...nodes, ...edges],
          style: [
            {
              selector: 'node',
              style: {
                'background-color': '#10b981',
                color: '#ecfeff',
                label: 'data(label)',
                'font-size': 14,
                'text-outline-color': '#065f46',
                'text-outline-width': 3,
                'text-wrap': 'wrap',
                'text-max-width': 180,
                width: 42,
                height: 42,
              },
            },
            {
              selector: 'edge',
              style: {
                width: 2.8,
                'line-color': '#38bdf8',
                'target-arrow-shape': 'triangle',
                'target-arrow-color': '#38bdf8',
                'curve-style': 'bezier',
                label: 'data(label)',
                color: '#cbd5e1',
                'font-size': 11,
                'text-rotation': 'none',
                'text-margin-y': -14,
                'text-wrap': 'wrap',
                'text-max-width': 220,
              },
            },
          ],
          layout,
        });
      }

      function renderResult(data) {
        const metrics = data.analytics?.searchMetrics;
        const pathHtml = data.path
          .map(
            (node, index) =>
              `${index > 0 ? '<span class="arrow">→</span>' : ''}<span class="artist-pill">${escapeHtml(node.name)}</span>`
          )
          .join('');

        const collaborations = data.collaborations?.length
          ? data.collaborations
              .map(
                (item, index) => `
                  <article class="collab-item">
                    <div class="muted">Step ${index + 1}</div>
                    <div class="track-name">${escapeHtml(item.track.name)}</div>
                    <div class="artists-line">
                      ${escapeHtml(item.fromArtist.name)} <span class="arrow">↔</span> ${escapeHtml(item.toArtist.name)}
                    </div>
                  </article>
                `
              )
              .join('')
          : '<div class="muted">No collaboration edges returned.</div>';
        const analyticsHtml = metrics
          ? `
            <h2 class="section-title">Search analytics</h2>
            <section class="analytics-grid">
              <article class="analytics-card">
                <div class="analytics-label">Graph density</div>
                <div class="analytics-value">${escapeHtml(metrics.graphDensity)}</div>
              </article>
              <article class="analytics-card">
                <div class="analytics-label">Average node degree</div>
                <div class="analytics-value">${escapeHtml(metrics.averageNodeDegree)}</div>
              </article>
              <article class="analytics-card">
                <div class="analytics-label">Nodes explored</div>
                <div class="analytics-value">${escapeHtml(metrics.nodesExplored)}</div>
              </article>
              <article class="analytics-card">
                <div class="analytics-label">Edges explored</div>
                <div class="analytics-value">${escapeHtml(metrics.edgesExplored)}</div>
              </article>
              <article class="analytics-card">
                <div class="analytics-label">Frontier layers expanded</div>
                <div class="analytics-value">${escapeHtml(metrics.frontierLayersExpanded)}</div>
              </article>
              <article class="analytics-card">
                <div class="analytics-label">Bidirectional balance score</div>
                <div class="analytics-value">${escapeHtml(metrics.bidirectionalBalanceScore)}</div>
              </article>
            </section>
          `
          : '';

        resultEl.innerHTML = `
          <section class="summary-grid">
            <div class="summary-card">
              <div class="summary-label">Source</div>
              <div class="summary-value">${escapeHtml(data.source.name)}</div>
            </div>
            <div class="summary-card">
              <div class="summary-label">Target</div>
              <div class="summary-value">${escapeHtml(data.target.name)}</div>
            </div>
            <div class="summary-card">
              <div class="summary-label">Distance</div>
              <div class="summary-value">${escapeHtml(data.distance)} hop(s)</div>
            </div>
          </section>
          <h2 class="section-title">Path</h2>
          <div class="path-flow">${pathHtml}</div>
          <h2 class="section-title">Graph visualization</h2>
          <div class="graph-mode-controls">
            <button id="graphModePath" type="button" class="graph-mode-btn">Path graph</button>
            <button id="graphModeExplored" type="button" class="graph-mode-btn">Full explored graph</button>
          </div>
          <div id="graph" class="graph-canvas"></div>
          ${analyticsHtml}
          <h2 class="section-title">Collaborations</h2>
          <section class="collab-list">${collaborations}</section>
        `;
        const graphModePathBtn = document.getElementById('graphModePath');
        const graphModeExploredBtn = document.getElementById('graphModeExplored');
        const hasExploredGraph = Array.isArray(data.exploredGraph?.nodes) && data.exploredGraph.nodes.length > 0;
        if (!hasExploredGraph) {
          graphMode = 'path';
        }

        const syncGraphModeButtons = () => {
          if (!graphModePathBtn || !graphModeExploredBtn) {
            return;
          }
          graphModePathBtn.classList.toggle('active', graphMode === 'path');
          graphModeExploredBtn.classList.toggle('active', graphMode === 'explored');
          graphModeExploredBtn.disabled = !hasExploredGraph;
        };

        if (graphModePathBtn && graphModeExploredBtn) {
          graphModePathBtn.addEventListener('click', () => {
            graphMode = 'path';
            syncGraphModeButtons();
            renderGraph(data);
          });
          graphModeExploredBtn.addEventListener('click', () => {
            if (!hasExploredGraph) {
              return;
            }
            graphMode = 'explored';
            syncGraphModeButtons();
            renderGraph(data);
          });
        }
        syncGraphModeButtons();
        renderGraph(data);
      }

      renderEmptyState('Submit a request to see the result.');

      function setStatus(message, type) {
        statusEl.textContent = message;
        statusEl.className = `status ${type || ''}`.trim();
      }

      function debounce(callback, waitMs) {
        let timerId = null;
        return (...args) => {
          if (timerId) {
            clearTimeout(timerId);
          }
          timerId = setTimeout(() => {
            callback(...args);
          }, waitMs);
        };
      }

      function bindArtistSuggestions(inputEl, dropdownEl) {
        let activeSuggestionsController = null;
        let selectedIndex = -1;

        function renderDropdown(items) {
          dropdownEl.innerHTML = items
            .map((item, index) => `<div class="artist-suggestion-item" data-index="${index}">${escapeHtml(item.name)}</div>`)
            .join('');
          selectedIndex = -1;
        }

        function hideDropdown() {
          dropdownEl.classList.remove('show');
          selectedIndex = -1;
        }

        function showDropdown() {
          if (dropdownEl.children.length > 0) {
            dropdownEl.classList.add('show');
          }
        }

        const loadSuggestions = debounce(async () => {
          const query = inputEl.value.trim();
          if (query.length < 2) {
            hideDropdown();
            return;
          }

          if (activeSuggestionsController) {
            activeSuggestionsController.abort();
          }
          activeSuggestionsController = new AbortController();

          try {
            const response = await fetch(`/api/music/artists/search?q=${encodeURIComponent(query)}`, {
              signal: activeSuggestionsController.signal,
            });
            if (!response.ok) {
              hideDropdown();
              return;
            }
            const body = await response.json();
            const items = Array.isArray(body.items) ? body.items : [];
            renderDropdown(items);
            showDropdown();
          } catch (error) {
            if (error instanceof DOMException && error.name === 'AbortError') {
              return;
            }
            hideDropdown();
          }
        }, 250);

        inputEl.addEventListener('input', () => {
          void loadSuggestions();
        });

        inputEl.addEventListener('focus', () => {
          if (dropdownEl.children.length > 0) {
            showDropdown();
          }
        });

        dropdownEl.addEventListener('click', (e) => {
          const item = e.target.closest('.artist-suggestion-item');
          if (item) {
            inputEl.value = item.textContent.trim();
            hideDropdown();
          }
        });

        inputEl.addEventListener('keydown', (e) => {
          const items = Array.from(dropdownEl.querySelectorAll('.artist-suggestion-item'));
          if (items.length === 0) return;

          if (e.key === 'ArrowDown') {
            e.preventDefault();
            selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
            updateSelection(items);
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            selectedIndex = Math.max(selectedIndex - 1, -1);
            updateSelection(items);
          } else if (e.key === 'Enter' && selectedIndex >= 0) {
            e.preventDefault();
            inputEl.value = items[selectedIndex].textContent.trim();
            hideDropdown();
          } else if (e.key === 'Escape') {
            hideDropdown();
          }
        });

        function updateSelection(items) {
          items.forEach((item, idx) => {
            item.classList.toggle('selected', idx === selectedIndex);
          });
        }

        document.addEventListener('click', (e) => {
          if (!inputEl.contains(e.target) && !dropdownEl.contains(e.target)) {
            hideDropdown();
          }
        });
      }

      bindArtistSuggestions(sourceArtistInput, sourceArtistDropdown);
      bindArtistSuggestions(targetArtistInput, targetArtistDropdown);

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        setStatus('Searching...', '');
        submitBtn.disabled = true;
        if (activeConnectionSearchController) {
          activeConnectionSearchController.abort();
        }
        activeConnectionSearchController = new AbortController();
        const timeoutHandle = setTimeout(() => {
          if (activeConnectionSearchController) {
            activeConnectionSearchController.abort();
          }
        }, SEARCH_TIMEOUT_MS);

        const formData = new FormData(form);
        const payload = {
          sourceArtist: String(formData.get('sourceArtist') || '').trim(),
          targetArtist: String(formData.get('targetArtist') || '').trim(),
          maxDepth: Number(formData.get('maxDepth')),
          maxAlbumsPerArtist: Number(formData.get('maxAlbumsPerArtist')),
          maxTracksPerAlbum: Number(formData.get('maxTracksPerAlbum')),
        };

        try {
          const response = await fetch('/api/music/connections', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            signal: activeConnectionSearchController.signal,
          });

          const body = await response.json();
          if (!response.ok) {
            throw new Error(body.message || `Request failed with ${response.status}`);
          }

          setStatus('Success.', 'success');
          renderResult(body);
        } catch (error) {
          setStatus('Request failed.', 'error');
          if (error instanceof DOMException && error.name === 'AbortError') {
              renderEmptyState(
                'Search took too long (over 2 minutes). Try smaller limits (lower depth/albums/tracks) or a different artist pair.'
              );
          } else {
            renderEmptyState(error instanceof Error ? error.message : 'Unknown error while contacting the API.');
          }
        } finally {
          clearTimeout(timeoutHandle);
          activeConnectionSearchController = null;
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
